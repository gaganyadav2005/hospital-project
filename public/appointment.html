<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Book Appointment</title>

<style>
body{
font-family: Arial;
background:#f5f5f5;
padding:40px;
}

.container{
max-width:500px;
margin:auto;
background:white;
padding:25px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input,textarea{
width:100%;
padding:10px;
margin-top:10px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:4px;
}

button{
background:#007BFF;
color:white;
padding:10px;
border:none;
border-radius:4px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

#successMsg{
color:green;
margin-top:10px;
font-weight:bold;
}
</style>

</head>

<body>

<div class="container">

<h2>Book Appointment</h2>

<p id="expertType"></p>

<form id="appointmentForm">

<input type="text" id="name" placeholder="Your Name" required>

<input type="email" id="email" placeholder="Your Email" required>

<input type="text" id="phone" placeholder="Phone Number" required>

<input type="time" id="time" required>

<textarea id="concern" placeholder="Your Concern"></textarea>

<button type="submit">Book Appointment</button>

</form>

<p id="successMsg"></p>

</div>

<!-- IMPORTANT: JS file path fix -->
<script src="appointment.js"></script>

</body>
</html>
